<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>彰化機務段輪班查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0a0c10;--s1:#111318;--s2:#181c24;--s3:#1e2330;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --acc:#f59e0b;--acc2:#fbbf24;--acc-d:rgba(245,158,11,0.12);
  --tx:#e8eaf0;--tx2:#9ca3b0;--tx3:#5a6070;
  --g:#10b981;--g-d:rgba(16,185,129,0.12);
  --r:#ef4444;--r-d:rgba(239,68,68,0.12);
  --b:#3b82f6;--b-d:rgba(59,130,246,0.12);
  --p:#a855f7;--p-d:rgba(168,85,247,0.12);
  --rad:12px;--rad-s:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
.topbar{background:var(--s1);border-bottom:1px solid var(--bdr);padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;height:54px}
.brand{display:flex;align-items:center;gap:8px;font-weight:900;font-size:15px;color:var(--acc);white-space:nowrap}
.nav-tabs{display:flex;gap:1px;flex:1;overflow-x:auto}
.nav-tab{background:none;border:none;cursor:pointer;color:var(--tx3);padding:6px 12px;font-size:12px;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
.nav-tab:hover{color:var(--tx2)}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.status-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--r);box-shadow:0 0 5px var(--r);transition:.3s}
.dot.on{background:var(--g);box-shadow:0 0 5px var(--g)}
.status-txt{font-size:10px;color:var(--tx3)}
.main{padding:20px 16px;max-width:960px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:580px){.day-grid{grid-template-columns:1fr}}
.day-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden}
.day-card.is-today{border-color:rgba(245,158,11,.25)}
.dc-head{padding:14px 16px 10px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start}
.dc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3)}
.dc-date{font-size:14px;font-weight:700;margin-top:3px;font-family:'DM Mono',monospace}
.dc-wd{font-size:11px;color:var(--tx3);margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
.badge-work{background:var(--acc-d);color:var(--acc)}
.badge-off{background:var(--r-d);color:var(--r)}
.badge-rest{background:var(--g-d);color:var(--g)}
.badge-leave{background:var(--b-d);color:var(--b)}
.badge-unknown{background:var(--s3);color:var(--tx3)}
.dc-body{padding:14px 16px}
.shift-num{font-size:40px;font-weight:900;color:var(--acc);font-family:'DM Mono',monospace;letter-spacing:-.02em;line-height:1;margin-bottom:6px}
.s-note{display:inline-block;font-size:11px;color:var(--tx3);background:var(--s3);padding:2px 8px;border-radius:4px;margin-bottom:10px}
.shift-img{width:100%;border-radius:var(--rad-s);margin-top:8px;border:1px solid var(--bdr);display:block}
.no-work{padding:24px 16px;text-align:center}
.no-work-icon{font-size:32px;margin-bottom:8px}
.no-work-label{font-size:14px;color:var(--tx2);font-weight:500}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px}
.cal-nav-btn{background:var(--s2);border:1px solid var(--bdr2);color:var(--tx);width:34px;height:34px;border-radius:var(--rad-s);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--acc);color:var(--acc)}
.cal-title{font-size:20px;font-weight:900;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
.cal-title:hover{color:var(--acc)}
.cal-title::after{content:'▾';font-size:13px;color:var(--tx3)}
.cal-nav-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.cal-month-drop{position:absolute;top:calc(100% + 6px);background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rad-s);box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:50;min-width:130px;overflow:hidden;display:none}
.cal-month-drop.open{display:block}
.cal-month-opt{padding:11px 18px;font-size:15px;cursor:pointer;transition:background .1s}
.cal-month-opt:hover{background:var(--s3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hd{text-align:center;font-size:11px;color:var(--tx3);padding:7px 0;font-weight:700}
.cal-cell{background:var(--s1);border:1px solid var(--bdr);border-radius:7px;padding:7px 5px;min-height:72px;position:relative;border-left-width:3px;border-left-color:var(--bdr)}
.cal-cell.empty{background:none;border-color:transparent}
.cal-cell.today{outline:2px solid var(--acc);outline-offset:0}
.cal-cell.work{border-left-color:var(--acc)}
.cal-cell.off{border-left-color:var(--r)}
.cal-cell.rest{border-left-color:var(--g)}
.cal-cell.leave{border-left-color:var(--b)}
.cc-day{font-size:12px;font-weight:700;margin-bottom:2px}
.cc-type{font-size:9px;color:var(--tx3)}
.cc-shift{font-size:11px;color:var(--acc);font-family:'DM Mono',monospace;font-weight:700}
.cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;justify-content:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.shift-filter-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--tx3);padding:4px 11px;border-radius:999px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.filter-btn.active{background:var(--acc-d);border-color:var(--acc);color:var(--acc)}
.srch{flex:1;min-width:160px;background:var(--s2);border:1px solid var(--bdr2);color:var(--tx);padding:6px 11px;border-radius:var(--rad-s);font-family:inherit;font-size:13px}
.srch:focus{outline:none;border-color:var(--acc)}
.shifts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:9px}
.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad-s);padding:13px;border-left-width:3px;border-left-color:var(--acc)}
.sc.variant{border-left-color:var(--p)}
.sc-name{font-size:16px;font-weight:900;color:var(--acc);font-family:'DM Mono',monospace;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.var-tag{font-size:9px;font-weight:700;background:var(--p-d);color:var(--p);padding:2px 5px;border-radius:3px;font-family:'Noto Sans TC',sans-serif}
.sc-note{font-size:11px;color:var(--tx3);margin-bottom:8px}
.sc-times{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px}
.sct-label{color:var(--tx3)}
.sct-val{color:var(--tx);font-family:'DM Mono',monospace;font-weight:600}
.on-badge{display:inline-block;font-size:10px;background:var(--p-d);color:var(--p);padding:2px 6px;border-radius:4px;margin-top:5px}
.sc-foot{display:flex;gap:5px;margin-top:9px}
.btn-sm{flex:1;background:none;border:1px solid var(--bdr2);color:var(--tx2);padding:7px 8px;border-radius:var(--rad-s);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-sm:hover{border-color:var(--acc);color:var(--acc)}
.btn-sm.warn{border-color:rgba(239,68,68,.3);color:var(--r)}
.btn-sm.warn:hover{background:var(--r-d)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--rad);padding:22px;width:100%;max-width:440px;box-shadow:0 16px 48px rgba(0,0,0,.6);transform:translateY(10px);transition:transform .2s;max-height:92vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal-wide{max-width:620px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--acc)}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:700}
.fi,.fs{width:100%;background:var(--s2);border:1px solid var(--bdr2);color:var(--tx);padding:8px 11px;border-radius:var(--rad-s);font-family:inherit;font-size:13px;transition:border-color .15s}
.fi:focus,.fs:focus{outline:none;border-color:var(--acc)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rad-s);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-primary{background:var(--acc);color:#0a0c10;border-color:var(--acc)}
.btn-primary:hover{background:var(--acc2)}
.btn-secondary{background:var(--s2);color:var(--tx);border-color:var(--bdr2)}
.btn-secondary:hover{border-color:var(--tx2)}
.btn-ghost{background:none;color:var(--tx2);border-color:var(--bdr2)}
.btn-ghost:hover{border-color:var(--tx2);color:var(--tx)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:9px}
.sec-title{font-size:18px;font-weight:900}
.sec-sub{font-size:12px;color:var(--tx3);margin-top:2px}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:18px;margin-bottom:14px}
.sep{height:1px;background:var(--bdr);margin:14px 0}
.empty-state{text-align:center;padding:40px 16px;color:var(--tx3);border:1px dashed var(--bdr2);border-radius:var(--rad)}
.empty-icon{font-size:36px;margin-bottom:10px}
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--s1);border:1px solid var(--bdr2);color:var(--tx);padding:10px 14px;border-radius:var(--rad-s);font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tin .2s ease;display:flex;align-items:center;gap:7px}
.toast.ok{border-left:3px solid var(--g)}
.toast.err{border-left:3px solid var(--r)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.app-hidden{display:none!important}
.admin-only{display:none!important}
.admin-mode .admin-only{display:flex!important}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--tx3)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
@media(max-width:580px){
  .main{padding:14px 11px}
  .cal-cell{min-height:58px}
  .f2{grid-template-columns:1fr}
  .nav-tab .nav-lbl{display:none}
}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div class="loading-txt">連線中...</div>
</div>

<div id="app" class="app-hidden" style="flex-direction:column;min-height:100vh">
  <div class="topbar">
    <div class="brand">🚂 <span>彰化機務段輪班查詢</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('home')">⊙ <span class="nav-lbl">首頁</span></button>
      <button class="nav-tab" onclick="showPage('calendar')">▦ <span class="nav-lbl">月曆</span></button>
      <button class="nav-tab admin-only" onclick="showPage('admin')">⚙ <span class="nav-lbl">管理員</span></button>
    </div>
    <div class="status-wrap">
      <div class="dot" id="statusDot"></div>
      <span class="status-txt" id="statusTxt">連線中</span>
    </div>
  </div>

  <div class="main">

    <!-- HOME -->
    <div id="page-home" class="page active">
      <div id="empPrompt">
        <div style="text-align:center;padding:60px 16px 40px">
          <div style="font-size:52px;margin-bottom:16px">🚂</div>
          <div style="font-size:20px;font-weight:900;margin-bottom:8px">彰化機務段輪班查詢</div>
          <div style="font-size:13px;color:var(--tx3);margin-bottom:28px">輸入員工編號，查詢自己的班表</div>
          <div style="display:flex;gap:9px;max-width:300px;margin:0 auto">
            <input class="fi" type="text" id="empInput" placeholder="員工編號" inputmode="numeric"
              onkeydown="if(event.key==='Enter')setEmp()" style="flex:1;font-size:15px;padding:10px 13px">
            <button class="btn btn-primary" onclick="setEmp()">查詢</button>
          </div>
        </div>
      </div>
      <div id="empInfo" style="display:none">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;background:var(--s2);border-radius:var(--rad);padding:12px 16px;border:1px solid var(--bdr)">
          <div style="flex:1">
            <div style="font-size:10px;color:var(--tx3);margin-bottom:2px">目前查詢</div>
            <div style="font-weight:700;font-size:14px" id="empDisplay">—</div>
          </div>
          <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="changeEmp()">更換</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <button class="cal-nav-btn" onclick="homeMove(-1)">‹</button>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em" id="homeLabel">今日 ／ 明日</div>
            <div style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace;margin-top:2px" id="todayDisp">—</div>
          </div>
          <button class="cal-nav-btn" onclick="homeMove(1)">›</button>
        </div>
        <div class="day-grid" id="dayCards"></div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div id="page-calendar" class="page">
      <div id="calNoEmp" style="display:none">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div>請先在首頁輸入員工編號</div>
          <button class="btn btn-secondary" onclick="showPage('home')" style="margin-top:14px">前往首頁</button>
        </div>
      </div>
      <div id="calContent">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
          <div class="cal-nav-wrap">
            <div class="cal-title" id="calTitle" onclick="toggleCalDrop()"></div>
            <div class="cal-month-drop" id="calMonthDrop"></div>
          </div>
          <button class="cal-nav-btn" onclick="calMove(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--acc)"></div>工作班</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--r)"></div>例假</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--g)"></div>休班</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--b)"></div>特休</div>
        </div>
        <div id="calNoData" style="display:none;text-align:center;padding:16px 0;font-size:13px;color:var(--tx3)">📭 本月班表尚未匯入</div>
        <div style="margin-top:14px;display:flex;justify-content:center">
          <button class="btn btn-secondary" onclick="subscribeCalendar()" style="font-size:13px;padding:9px 18px">📅 訂閱手機行事曆</button>
        </div>
      </div>
    </div>

    <!-- ADMIN -->
    <div id="page-admin" class="page">
      <div class="card" style="margin-bottom:24px">
        <div class="sec-head" style="margin-bottom:16px">
          <div>
            <div class="sec-title">上傳月班表</div>
            <div class="sec-sub">上傳公司月班表 Excel，更新全員當月排班資料</div>
          </div>
        </div>
        <div class="fg">
          <label class="fl">選擇 Excel 檔案</label>
          <input type="file" id="xlUpFile" accept=".xlsx,.xls" onchange="parseUploadXLSX(event)" style="color:var(--tx2);font-size:13px">
        </div>
        <div id="xlUpPrev" style="font-size:12px;color:var(--tx3);margin-top:8px;min-height:18px"></div>
        <div style="margin-top:14px">
          <button class="btn btn-primary" onclick="doUpload()">☁️ 確認上傳</button>
        </div>
      </div>

      <div class="sec-head">
        <div>
          <div class="sec-title">工作班資料庫</div>
          <div class="sec-sub" id="shiftsCount">共 0 班</div>
        </div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn btn-secondary" onclick="openImportShiftXLSX()">📥 匯入 Excel</button>
        </div>
      </div>
      <div class="shift-filter-row">
        <input class="srch" id="shiftSrch" type="text" placeholder="🔍 搜尋班號..." oninput="renderShifts()">
        <button class="filter-btn active" onclick="setFilter(this,'all')">全部</button>
        <button class="filter-btn" onclick="setFilter(this,'variant')">假日變班</button>
        <button class="filter-btn" onclick="setFilter(this,'overnight')">跨日班</button>
      </div>
      <div id="shiftsList" class="shifts-grid"></div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<div class="toast-wrap" id="toastWrap"></div>
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────
const SUPABASE_URL      = 'https://pgvrnhzbxgwcqbzeanai.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBndnJuaHpieGd3Y3FiemVhbmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTg3NDYsImV4cCI6MjA5Mzk3NDc0Nn0.hcIlr_ZIaDjd1YRWJv8rM3wu6-Ix16pPyBVgVHeE4xc';
const IMAGE_BASE        = 'https://barett07.github.io/railwayshift/images/';
const ADMIN_MODE        = new URLSearchParams(window.location.search).get('admin') === '651692';

// ── STATE ────────────────────────────────────────
let employeeId = '';
let employeeName = '';
let shiftsMap = {};
let monthCache = {};
let calY = new Date().getFullYear();
let calM = new Date().getMonth() + 1;
let homeOffset = 0;
let _parsedUpload = null;
let _parsedShiftXLSX = null;
let shiftFilter = 'all';
let tempOverrides = {};

// ── SUPABASE ─────────────────────────────────────
const SB_H = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
  'Content-Type': 'application/json'
};
async function sbFetch(path, opts) {
  const r = await fetch(SUPABASE_URL + path, { ...opts, headers: { ...SB_H, ...(opts?.headers || {}) } });
  if (!r.ok) { const t = await r.text(); throw new Error(r.status + ' ' + t.slice(0, 160)); }
  return r.headers.get('content-length') === '0' || r.status === 204 ? null : r.json();
}

// ── DATE UTILS ───────────────────────────────────
const p2 = n => String(n).padStart(2, '0');
function todayStr() { const d = new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function addDays(ds, n) { const d = new Date(ds+'T00:00:00'); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
const WD = ['日','一','二','三','四','五','六'];
function wd(ds) { return WD[new Date(ds+'T00:00:00').getDay()]; }
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function fmt(t) { return t || '—'; }

// ── SHIFT HELPERS ────────────────────────────────
function mapShift(row) {
  return {
    id: row.id, name: row.name || row.id,
    startTime: row.start_time || '',
    endTime: row.end_time || '',
    specialNote: row.special_note || '',
    isOvernight: row.is_overnight || false,
    depTrain: row.dep_train || '',
    arrTrain: row.arr_train || '',
  };
}
async function loadShifts() {
  const data = await sbFetch('/rest/v1/shifts?select=*&order=id');
  shiftsMap = {};
  (data || []).forEach(row => { const s = mapShift(row); shiftsMap[s.id] = s; });
  const el = document.getElementById('shiftsCount');
  if (el) el.textContent = `共 ${Object.keys(shiftsMap).length} 班`;
}
function getShift(id) {
  if (!id) return null;
  if (shiftsMap[id]) return shiftsMap[id];
  const base = id.replace(/AV$|V$/, '');
  return shiftsMap[base] || null;
}
function sortShifts(arr) {
  return [...arr].sort((a, b) => {
    const parse = name => { const m = name.match(/^(\d+)(.*)/); return m ? [parseInt(m[1]), m[2]] : [9999, name]; };
    const [an, as] = parse(a.name), [bn, bs] = parse(b.name);
    if (an !== bn) return an - bn;
    const rank = s => s===''?0:s==='AV'?1:s==='V'?2:3;
    return rank(as) - rank(bs) || as.localeCompare(bs);
  });
}

// ── DAY INFO ─────────────────────────────────────
function codeToInfo(code) {
  const c = String(code || '').trim();
  if (!c || c === '—' || c === '-' || c === '休') return { type: 'rest' };
  if (c === '例假') return { type: 'off' };
  if (c === '特休') return { type: 'leave' };
  return { type: 'work', shiftId: c };
}
function getDayInfo(ds) {
  if (tempOverrides[ds]) return tempOverrides[ds];
  const [y, m, d] = ds.split('-');
  const data = monthCache[`${y}-${m}`];
  if (!data) return { type: 'unknown' };
  return codeToInfo(data[parseInt(d)]);
}

// ── MONTH LOADING ────────────────────────────────
async function loadMonth(y, m) {
  const key = `${y}-${p2(m)}`;
  if (key in monthCache) return;
  monthCache[key] = null;
  if (!employeeId) { monthCache[key] = {}; return; }
  try {
    const data = await sbFetch(`/rest/v1/monthly_schedules?employee_id=eq.${encodeURIComponent(employeeId)}&year=eq.${y}&month=eq.${m}&select=day,shift_code`);
    const map = {};
    (data || []).forEach(r => { map[r.day] = r.shift_code || ''; });
    monthCache[key] = map;
  } catch(e) {
    delete monthCache[key];
    throw e;
  }
}

}

// ── CALENDAR ─────────────────────────────────────
const CAL_LABEL = { off:'例假', rest:'休班', leave:'特休' };
function renderCal() {
  document.getElementById('calTitle').textContent = `${calY} 年 ${calM} 月`;
  const days = daysInMonth(calY, calM), first = new Date(calY, calM-1, 1).getDay(), today = todayStr();
  const key = `${calY}-${p2(calM)}`;
  let h = ['日','一','二','三','四','五','六'].map(w => `<div class="cal-hd">${w}</div>`).join('');
  for (let i = 0; i < first; i++) h += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= days; d++) {
    const ds = `${calY}-${p2(calM)}-${p2(d)}`;
    const info = getDayInfo(ds), sh = info.shiftId ? getShift(info.shiftId) : null;
    const cls = TC[info.type] || '';
    const name = sh ? sh.name : (info.type==='work'&&info.shiftId ? info.shiftId : '');
    const typeLabel = (!name && info.type !== 'unknown') ? (CAL_LABEL[info.type] || '') : '';
    h += `<div class="cal-cell ${cls} ${ds===today?'today':''}">
      <div class="cc-day">${d}</div>
      ${name ? `<div class="cc-shift">${name}</div>` : ''}
      ${typeLabel ? `<div class="cc-type">${typeLabel}</div>` : ''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = h;
  const noData = document.getElementById('calNoData');
  if (noData) noData.style.display = (key in monthCache && !(monthCache[key] && Object.keys(monthCache[key]).length)) ? '' : 'none';
}
async function calMove(dir) {
  const prevY = calY, prevM = calM;
  calM += dir;
  if (calM > 12) { calM = 1; calY++; } else if (calM < 1) { calM = 12; calY--; }
  try { await loadMonth(calY, calM); } catch(e) { calY = prevY; calM = prevM; console.warn(e); return; }
  const key = `${calY}-${p2(calM)}`;
  if (monthCache[key] && Object.keys(monthCache[key]).length === 0) {
    toast(`${calY} 年 ${calM} 月尚未匯入班表`, 'err');
    calY = prevY; calM = prevM;
    return;
  }
  renderCal();
}

// ── ADMIN: UPLOAD MONTHLY SCHEDULE ───────────────
window.parseUploadXLSX = function(e) {
    const file = e.target.files[0]; if (!file) return;
    const prev = document.getElementById('xlUpPrev');
    prev.textContent = '解析中...';
    _parsedUpload = null;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        // Detect year/month
        let year=null, month=null;
        for (let i=0; i<Math.min(6,rows.length); i++) {
          const line = rows[i].map(c=>String(c)).join('');
          const m1 = line.match(/(\d{3})年(\d{1,2})月/);
          const m2 = line.match(/(\d{4})年(\d{1,2})月/);
          if (m1) { year=parseInt(m1[1])+1911; month=parseInt(m1[2]); break; }
          if (m2 && parseInt(m2[1])>1900) { year=parseInt(m2[1]); month=parseInt(m2[2]); break; }
        }
        if (!year) {
          const fn = file.name, fnm = fn.match(/(\d{3})年?(\d{2})月/);
          if (fnm) { year=parseInt(fnm[1])+1911; month=parseInt(fnm[2]); }
          else { year=new Date().getFullYear(); month=new Date().getMonth()+1; }
        }
        // Find date header row
        let hrIdx=-1, dateColMap={}, maxHits=0;
        for (let i=0; i<rows.length; i++) {
          const tmp={};
          rows[i].forEach((c,ci) => {
            const v = typeof c==='number' ? c : parseFloat(String(c).trim());
            if (Number.isInteger(v) && v>=1 && v<=31) tmp[v]=ci;
          });
          if (Object.keys(tmp).length > maxHits) { maxHits=Object.keys(tmp).length; hrIdx=i; dateColMap=tmp; }
        }
        if (maxHits < 20) { prev.textContent='❌ 找不到日期欄位，請確認 Excel 格式'; return; }
        const maxDay = daysInMonth(year, month);
        const workers = [];
        for (let r=hrIdx+1; r<rows.length; r++) {
          const row = rows[r];
          const rawName = String(row[0]||'').trim();
          if (!rawName) continue;
          const nameParts = rawName.split(/[\n\r]/);
          const name = nameParts[0].trim();
          if (!name) continue;
          if (/^[日一二三四五六衛接\s]+$/.test(name)) continue;
          if (/^[123][\.\、]|^注意/.test(name)) continue;
          let hasData = false;
          for (let d=1; d<=maxDay; d++) {
            if (dateColMap[d]!==undefined && String(row[dateColMap[d]]||'').trim()) { hasData=true; break; }
          }
          if (!hasData) continue;
          const id = (nameParts[1]?.trim() || String(row[1]||'').trim());
          const days = {};
          for (let d=1; d<=maxDay; d++) {
            if (dateColMap[d]===undefined) continue;
            days[d] = String(row[dateColMap[d]]||'').trim();
          }
          workers.push({ name, id, days });
        }
        if (!workers.length) { prev.textContent='❌ 未找到任何人員班表資料'; return; }
        _parsedUpload = { year, month, workers };
        prev.innerHTML = `✅ <b>${year} 年 ${p2(month)} 月</b>，共 ${workers.length} 人，確認無誤後點擊「確認上傳」`;
      } catch(err) {
        prev.textContent = '❌ 解析失敗：' + err.message;
        _parsedUpload = null;
      }
    };
    reader.readAsArrayBuffer(file);
};

window.doUpload = async function() {
  if (!_parsedUpload) { toast('請先選擇並解析 Excel 檔案', 'err'); return; }
  const { year, month, workers } = _parsedUpload;
  if (!confirm(`確認上傳 ${year}年${p2(month)}月 班表？共 ${workers.length} 人，現有資料將被覆蓋。`)) return;
  const prev = document.getElementById('xlUpPrev');
  prev.textContent = '上傳中，請稍候...';
  try {
    // 1. Upsert workers (deduplicate by employee_id — same person may appear twice in Excel)
    const wMap = new Map();
    for (const w of workers) {
      if (w.id) wMap.set(String(w.id), { employee_id: String(w.id), name: w.name });
    }
    const wRows = [...wMap.values()];
    if (wRows.length) {
      prev.textContent = `上傳中：同步員工資料（${wRows.length} 人）...`;
      await sbFetch('/rest/v1/workers', {
        method: 'POST',
        headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(wRows)
      });
    }
    // 2. Delete existing for this year/month
    prev.textContent = `上傳中：清除舊班表資料...`;
    await sbFetch(`/rest/v1/monthly_schedules?year=eq.${year}&month=eq.${month}`, {
      method: 'DELETE', headers: { 'Prefer': 'return=minimal' }
    });
    // 3. Build insert rows (deduplicate by employee_id+day)
    const rowMap = new Map();
    for (const w of workers) {
      if (!w.id) continue;
      const empId = String(w.id);
      for (const [d, code] of Object.entries(w.days)) {
        const c = code.trim();
        if (c) rowMap.set(`${empId}-${d}`, { year, month, employee_id: empId, day: parseInt(d), shift_code: c });
      }
    }
    const rows = [...rowMap.values()];
    // 4. Insert in chunks of 500 (DELETE already cleared existing data)
    const total = rows.length;
    for (let i=0; i<rows.length; i+=500) {
      prev.textContent = `上傳中：寫入班表（${Math.min(i+500, total)}/${total} 筆）...`;
      await sbFetch('/rest/v1/monthly_schedules', {
        method: 'POST',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify(rows.slice(i, i+500))
      });
    }
    // 5. Clear cache and refresh
    const key = `${year}-${p2(month)}`;
    delete monthCache[key];
    const now = new Date();
    if (year===now.getFullYear() && month===now.getMonth()+1) {
      await loadMonth(year, month);
      renderHome();
    }
    if (year===calY && month===calM) {
      await loadMonth(year, month);
      renderCal();
    }
    prev.innerHTML = `✅ 上傳完成！${year}年${p2(month)}月，${workers.length} 人，${rows.length} 筆班表資料`;
    toast(`✅ 上傳成功`, 'ok');
    _parsedUpload = null;
    document.getElementById('xlUpFile').value = '';
  } catch(e) {
    prev.textContent = '❌ 上傳失敗：' + e.message;
    toast('上傳失敗', 'err');
  }
};

// ── ADMIN: SHIFTS MANAGEMENT ──────────────────────
function renderShifts() {
  const q = (document.getElementById('shiftSrch')?.value || '').toLowerCase();
  let list = Object.values(shiftsMap);
  if (shiftFilter === 'variant')   list = list.filter(s => /[AV]/.test(s.name));
  if (shiftFilter === 'overnight') list = list.filter(s => s.isOvernight);
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q));
  list = sortShifts(list);
  const el = document.getElementById('shiftsList');
  if (!el) return;
  if (!list.length) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">${Object.keys(shiftsMap).length?'🔍':'📋'}</div><div>${Object.keys(shiftsMap).length?'找不到符合班次':'尚無工作班資料，請從管理員匯入 Excel'}</div></div>`;
    return;
  }
  const cnt = document.getElementById('shiftsCount');
  if (cnt) cnt.textContent = `共 ${Object.keys(shiftsMap).length} 班`;
  el.innerHTML = list.map(s => {
    const isV = /[AV]$/.test(s.name) || s.name.includes('AV');
    return `<div class="sc ${isV?'variant':''}">
      <div class="sc-name">${s.name}${isV?' <span class="var-tag">假日變班</span>':''}</div>
      ${s.specialNote?`<div class="sc-note">📋 ${s.specialNote}</div>`:''}
      <div class="sc-times">
        <div><div class="sct-label">⏱ 上班</div><div class="sct-val">${fmt(s.startTime)}</div></div>
        <div><div class="sct-label">🏁 下班</div><div class="sct-val">${fmt(s.endTime)}</div></div>
      </div>
      <div class="sc-foot">
        <button class="btn-sm" onclick="openEditShift('${s.id}')">✏️ 編輯</button>
        <button class="btn-sm warn" onclick="deleteShift('${s.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function setFilter(btn, f) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); shiftFilter = f; renderShifts();
}
function openEditShift(id) {
  const s = shiftsMap[id];
  if (!s) return;
  setModal(`編輯 ${s.name}`, `
    <div class="f2">
      <div class="fg"><label class="fl">上班時間</label>
        <div style="display:flex;gap:6px">
          <input class="fi" type="time" id="est" value="${s.startTime}" style="flex:1">
          <button class="btn btn-ghost" style="padding:8px 10px;flex-shrink:0" onclick="document.getElementById('est').value=''" title="清除">✕</button>
        </div></div>
      <div class="fg"><label class="fl">下班時間</label>
        <div style="display:flex;gap:6px">
          <input class="fi" type="time" id="eet" value="${s.endTime}" style="flex:1">
          <button class="btn btn-ghost" style="padding:8px 10px;flex-shrink:0" onclick="document.getElementById('eet').value=''" title="清除">✕</button>
        </div></div>
    </div>
    <div class="fg"><label class="fl">特定行駛說明</label>
      <input class="fi" id="esn" value="${s.specialNote}" placeholder="如 日停、三駛"></div>`,
    [{label:'取消',cls:'btn-secondary',fn:'closeM()'},{label:'儲存',cls:'btn-primary',fn:`saveShift('${id}')`}]
  );
}
window.saveShift = async function(id) {
  const startTime = document.getElementById('est').value;
  const endTime   = document.getElementById('eet').value;
  const specialNote = document.getElementById('esn').value.trim();
  const isOvernight = endTime && startTime ? endTime <= startTime : false;
  try {
    await sbFetch(`/rest/v1/shifts?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ start_time: startTime, end_time: endTime, special_note: specialNote, is_overnight: isOvernight })
    });
    if (shiftsMap[id]) Object.assign(shiftsMap[id], { startTime, endTime, specialNote, isOvernight });
    renderShifts(); closeM(); toast('已儲存', 'ok');
  } catch(e) { toast('儲存失敗：' + e.message, 'err'); }
};
window.deleteShift = async function(id) {
  if (!confirm(`確定刪除 ${id}？`)) return;
  try {
    await sbFetch(`/rest/v1/shifts?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
    delete shiftsMap[id];
    renderShifts(); toast('已刪除', 'ok');
  } catch(e) { toast('刪除失敗', 'err'); }
};
// Import shift definition Excel (same as railwayshift parseXLSX)
window.openImportShiftXLSX = function() {
  _parsedShiftXLSX = null;
  setModal('匯入工作班 Excel', `
    <div style="font-size:12px;color:var(--tx3);margin-bottom:12px">上傳含有「工作班、上班時間、下班時間」欄位的 Excel</div>
    <div class="fg"><label class="fl">選擇檔案</label>
      <input type="file" id="sxFile" accept=".xlsx,.xls" style="color:var(--tx2);font-size:13px"></div>
    <div id="sxPrev" style="font-size:12px;color:var(--tx3);margin-top:8px"></div>`,
    [{label:'取消',cls:'btn-secondary',fn:'closeM()'},{label:'確認匯入',cls:'btn-primary',fn:'doImportShifts()'}]
  );
  setTimeout(() => document.getElementById('sxFile')?.addEventListener('change', parseShiftXLSX), 100);
};
function parseShiftXLSX(e) {
  const file = e.target.files[0]; if (!file) return;
  const prev = document.getElementById('sxPrev');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      let hr = -1;
      for (let i=0; i<rows.length; i++) { if (rows[i].some(c => String(c).trim()==='工作班')) { hr=i; break; } }
      if (hr < 0) { prev.textContent='❌ 找不到「工作班」欄位'; return; }
      const colMap = {};
      rows[hr].forEach((h,i) => { const k=String(h).trim(); if(k) colMap[k]=i; });
      const required = ['工作班','上班時間','下班時間'];
      const missing = required.filter(k => colMap[k]===undefined);
      if (missing.length) { prev.textContent='❌ 缺少欄位：'+missing.join('、'); _parsedShiftXLSX=null; return; }
      const ci = { name:colMap['工作班'], st:colMap['上班時間'], et:colMap['下班時間'],
        sn:colMap['工作班特定行駛']??colMap['備註']??-1,
        dep:colMap['上班車次']??-1, arr:colMap['下班車次']??-1 };
      const toT = v => { if(!v&&v!==0)return''; const s=String(v).trim(); if(s.includes(':')){ const p=s.split(':'); return p[0].padStart(2,'0')+':'+p[1].padStart(2,'0'); } if(typeof v==='number'){ const m=Math.round(v*24*60); return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); } return''; };
      _parsedShiftXLSX = [];
      for (let r=hr+1; r<rows.length; r++) {
        const row=rows[r], name=String(row[ci.name]||'').trim();
        if (!name||name==='nan') continue;
        const st=toT(row[ci.st]), et=toT(row[ci.et]);
        _parsedShiftXLSX.push({ id:name, name, start_time:st, end_time:et,
          special_note:ci.sn>=0?String(row[ci.sn]||'').trim():'',
          dep_train:ci.dep>=0?String(row[ci.dep]||'').trim():'',
          arr_train:ci.arr>=0?String(row[ci.arr]||'').trim():'',
          is_overnight: et&&st ? et<=st : false,
          board_time:'', alight_time:'' });
      }
      if (!_parsedShiftXLSX.length) { prev.textContent='❌ 未找到工作班資料'; _parsedShiftXLSX=null; return; }
      prev.textContent = `✅ 解析完成：${_parsedShiftXLSX.length} 個工作班`;
    } catch(err) { prev.textContent='❌ 解析失敗：'+err.message; _parsedShiftXLSX=null; }
  };
  reader.readAsArrayBuffer(file);
}
window.doImportShifts = async function() {
  if (!_parsedShiftXLSX?.length) { toast('請先選擇檔案', 'err'); return; }
  if (!confirm(`確認匯入 ${_parsedShiftXLSX.length} 個工作班？`)) return;
  try {
    // Deduplicate by id (Excel may have repeated rows)
    const seen = new Set();
    const rows = _parsedShiftXLSX.filter(s => { if (seen.has(s.id)) return false; seen.add(s.id); return true; });
    await sbFetch('/rest/v1/shifts?id=not.is.null', { method:'DELETE', headers:{'Prefer':'return=minimal'} });
    for (let i=0; i<rows.length; i+=100) {
      await sbFetch('/rest/v1/shifts', {
        method:'POST',
        headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify(rows.slice(i,i+100))
      });
    }
    await loadShifts(); renderShifts(); closeM();
    toast(`✅ 已匯入 ${rows.length} 個工作班`, 'ok');
    _parsedShiftXLSX = null;
  } catch(e) { toast('匯入失敗：'+e.message, 'err'); }
};

// ── MODAL / TOAST / NAV ───────────────────────────
function setModal(title, body, actions, wide) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalBox').className = 'modal' + (wide?' modal-wide':'');
  document.getElementById('modalActions').innerHTML = actions.map(a =>
    `<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function overlayClick(e) { if (e.target===document.getElementById('overlay')) closeM(); }
function closeM() { document.getElementById('overlay').classList.remove('open'); }
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'toast ' + type; el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function setStatus(on) {
  const dot = document.getElementById('statusDot'), txt = document.getElementById('statusTxt');
  if (dot) dot.className = 'dot' + (on?' on':'');
  if (txt) txt.textContent = on ? '已連線' : '離線';
}
function showPage(name) {
  const alreadyOnCal = name === 'calendar' && document.getElementById('page-calendar')?.classList.contains('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name)?.classList.add('active');
  const idx = { home:0, calendar:1, admin:2 };
  document.querySelectorAll('.nav-tab')[idx[name]]?.classList.add('active');
  if (name === 'home') { homeOffset = 0; renderHome(); }
  if (name === 'calendar') {
    if (alreadyOnCal) { const now = new Date(); calY = now.getFullYear(); calM = now.getMonth() + 1; }
    updateEmpUI();
    loadMonth(calY, calM).then(() => renderCal()).catch(console.warn);
  }
  if (name === 'admin') renderShifts();
}
function showApp() {
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.classList.remove('app-hidden');
  app.style.display = 'flex';
  if (ADMIN_MODE) app.classList.add('admin-mode');
  updateEmpUI();
  renderHome();
}

// ── INIT ─────────────────────────────────────────
async function init() {
  employeeId   = localStorage.getItem('rr_emp_id')   || '';
  employeeName = localStorage.getItem('rr_emp_name') || '';
  if (employeeId) loadTempOverrides();
  showApp();
  try {
    const now = new Date();
    const tasks = [loadShifts()];
    if (employeeId) tasks.push(loadMonth(now.getFullYear(), now.getMonth()+1));
    await Promise.all(tasks);
    setStatus(true);
    renderHome();
  } catch(e) {
    setStatus(false);
    console.warn('Init error:', e);
  }
}

setTimeout(() => {
  const l = document.getElementById('loading'), a = document.getElementById('app');
  if (l && l.style.display !== 'none') {
    l.style.display = 'none';
    if (a) { a.style.display = 'flex'; a.classList.remove('app-hidden'); }
  }
}, 4000);

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
