<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<title>彰化機務段輪班查詢</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#000000;--s1:#1C1C1E;--s2:#2C2C2E;--s3:#3A3A3C;
  --bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.14);
  --acc:#FF9F0A;--acc2:#FFB340;--acc-d:rgba(255,159,10,0.16);
  --tx:#F2F2F7;--tx2:#98989F;--tx3:#6E6E73;
  --g:#30D158;--g-d:rgba(48,209,88,0.15);
  --r:#FF453A;--r-d:rgba(255,69,58,0.15);
  --b:#0A84FF;--b-d:rgba(10,132,255,0.15);
  --p:#BF5AF2;--p-d:rgba(191,90,242,0.15);
  --cyan:#64D2FF;
  --rad:18px;--rad-s:10px;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  --glass:rgba(28,28,30,.72);--glass-edge:rgba(255,255,255,.12);
  --glass-lq:rgba(28,28,30,.5);
  --dim:rgba(0,0,0,.55);
}
@media (prefers-color-scheme: light){
  :root{
    --bg:#F2F2F7;--s1:#FFFFFF;--s2:#F2F2F7;--s3:#E5E5EA;
    --bdr:rgba(60,60,67,0.12);--bdr2:rgba(60,60,67,0.2);
    --acc:#FF9500;--acc2:#FFB340;--acc-d:rgba(255,149,0,0.14);
    --tx:#1C1C1E;--tx2:#6C6C70;--tx3:#8E8E93;
    --g:#34C759;--g-d:rgba(52,199,89,0.14);
    --r:#FF3B30;--r-d:rgba(255,59,48,0.13);
    --b:#007AFF;--b-d:rgba(0,122,255,0.12);
    --p:#AF52DE;--p-d:rgba(175,82,222,0.13);
    --cyan:#32ADE6;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.07);
    --glass:rgba(249,249,249,.75);--glass-edge:rgba(255,255,255,.6);
    --glass-lq:rgba(255,255,255,.55);
    --dim:rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang TC','Noto Sans TC',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
.topbar{background:var(--bg);border-bottom:1px solid transparent;transition:border-color .3s;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;height:54px}
.topbar.scrolled{border-bottom-color:var(--bdr)}
.brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:-.01em;color:var(--acc);white-space:nowrap;min-width:0}
.brand span{overflow:hidden;text-overflow:ellipsis;min-width:0}
.brand-short{display:none}
.tabbar{position:fixed;left:50%;bottom:max(8px,calc(env(safe-area-inset-bottom) - 16px));transform:translateX(-50%);z-index:150;display:flex;gap:3px;padding:5px;border-radius:999px;background:var(--glass-lq);-webkit-backdrop-filter:blur(28px) saturate(200%);backdrop-filter:blur(28px) saturate(200%);border:1px solid var(--glass-edge);box-shadow:0 12px 40px rgba(0,0,0,.32),0 1px 2px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.18),inset 0 -1px 1px rgba(255,255,255,.05);max-width:calc(100vw - 20px);overflow-x:auto;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab-lens{position:absolute;top:5px;bottom:5px;left:0;width:0;border-radius:999px;background:var(--acc-d);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 1px rgba(255,255,255,.06),0 2px 10px rgba(0,0,0,.15);pointer-events:none;transition:transform .5s cubic-bezier(.3,1.35,.35,1),width .5s cubic-bezier(.3,1.35,.35,1)}
.nav-tab{position:relative;background:none;border:none;cursor:pointer;color:var(--tx2);padding:9px 14px;font-size:13px;font-weight:600;font-family:inherit;border-radius:999px;transition:transform .1s ease-out,color .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;flex-shrink:0;min-height:44px}
.nav-tab:hover{color:var(--tx)}
.nav-tab.active{color:var(--acc)}
.nav-tab svg{width:19px;height:19px;flex-shrink:0}
.status-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
.clock{font-size:14px;font-weight:600;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.02em}
.emp-chip{display:flex;align-items:center;gap:5px;background:var(--s2);border:none;border-radius:999px;color:var(--tx);font-family:inherit;font-size:13px;font-weight:600;padding:8px 14px;min-height:40px;cursor:pointer;min-width:0;max-width:45vw;transition:transform .1s ease-out,background .15s}
.emp-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.emp-chip:active{transform:scale(.96)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--r);box-shadow:0 0 5px var(--r);transition:.3s}
.dot.on{background:var(--g);box-shadow:0 0 5px var(--g)}
.main{padding:20px 16px calc(96px + env(safe-area-inset-bottom));max-width:960px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.slide-l{animation:pageSlideL .34s cubic-bezier(.32,.72,.28,1)}
.slide-r{animation:pageSlideR .34s cubic-bezier(.32,.72,.28,1)}
@keyframes pageSlideL{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}
@keyframes pageSlideR{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:none}}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:580px){.day-grid{grid-template-columns:1fr}}
.day-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;box-shadow:var(--shadow)}
.day-card.is-today{border-color:rgba(255,159,10,.35)}
.dc-head{padding:14px 16px 10px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start}
.dc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3)}
.dc-date{font-size:14px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
.dc-wd{font-size:11px;color:var(--tx3);margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:-.005em}
.badge-work{background:var(--acc-d);color:var(--acc)}
.badge-off{background:var(--r-d);color:var(--r)}
.badge-rest{background:var(--g-d);color:var(--g)}
.badge-leave{background:var(--b-d);color:var(--b)}
.badge-unknown{background:var(--s3);color:var(--tx3)}
.dc-body{padding:14px 16px}
.shift-num{font-size:42px;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums;letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.s-note{display:inline-block;font-size:11px;color:var(--tx3);background:var(--s3);padding:2px 8px;border-radius:4px;margin-bottom:10px}
.shift-img{width:100%;border-radius:var(--rad-s);margin-top:8px;border:1px solid var(--bdr);display:block}
.no-work{padding:24px 16px;text-align:center}
.no-work-icon{font-size:32px;margin-bottom:8px}
.no-work-label{font-size:14px;color:var(--tx2);font-weight:500}
.cal-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:16px 12px 14px;box-shadow:var(--shadow);margin-bottom:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;padding:0 6px}
.cal-nav-btn{background:var(--s2);border:none;color:var(--acc);width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .1s ease-out,background .15s}
.cal-nav-btn:hover{background:var(--s3)}
.cal-nav-btn:active{transform:scale(.92)}
.cal-nav-btn.glass{background:var(--glass-lq);-webkit-backdrop-filter:blur(20px) saturate(200%);backdrop-filter:blur(20px) saturate(200%);border:1px solid var(--glass-edge);box-shadow:0 6px 18px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.18),inset 0 -1px 1px rgba(255,255,255,.05)}
.cal-nav-btn.glass:hover{background:var(--glass-lq);filter:brightness(1.2)}
.cal-title{font-size:20px;font-weight:900;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
.cal-title:hover{color:var(--acc)}
.cal-title::after{content:'▾';font-size:13px;color:var(--tx3)}
.cal-nav-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.cal-month-drop{position:absolute;top:calc(100% + 6px);background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rad-s);box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:50;min-width:130px;overflow:hidden;display:none}
.cal-month-drop.open{display:block}
.cal-month-opt{padding:11px 18px;font-size:15px;cursor:pointer;transition:background .1s;white-space:nowrap;font-variant-numeric:tabular-nums}
.cal-month-opt.cur{color:var(--acc);font-weight:700}
.cal-month-opt:hover{background:var(--s3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hd{text-align:center;font-size:12px;color:var(--tx3);padding:7px 0;font-weight:600}
.cal-cell{background:none;border:none;border-radius:10px;padding:8px 2px;min-height:0;position:relative;display:flex;flex-direction:column;align-items:center;gap:3px}
@media(min-width:581px){.cal-cell{aspect-ratio:1/1.05;justify-content:flex-start;padding-top:14px}}
.cal-cell.empty{cursor:default}
.cal-cell.empty .cc-day{color:var(--tx3);opacity:.55}
.cc-day{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cc-day{background:var(--acc);color:#fff;font-weight:700}
.cal-cell.ex .cc-day{color:var(--cyan)}
.cal-cell.today.ex .cc-day{color:#fff}
.cc-type{font-size:12px;font-weight:600;color:var(--tx3)}
.cal-cell.off .cc-type{color:var(--r)}
.cal-cell.rest .cc-type{color:var(--g)}
.cal-cell.leave .cc-type{color:var(--b)}
.cc-shift{font-size:12px;color:var(--acc);font-variant-numeric:tabular-nums;font-weight:700}
.cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;justify-content:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.shift-filter-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--tx3);padding:8px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;min-height:36px}
.filter-btn.active{background:var(--acc-d);border-color:var(--acc);color:var(--acc)}
.srch{flex:1;min-width:160px;background:var(--s2);border:1px solid var(--bdr2);color:var(--tx);padding:8px 11px;border-radius:var(--rad-s);font-family:inherit;font-size:16px}
.srch:focus{outline:none;border-color:var(--acc)}
.shifts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:9px}
.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad-s);padding:13px;border-left-width:3px;border-left-color:var(--acc)}
.sc.variant{border-left-color:var(--p)}
.sc-name{font-size:16px;font-weight:900;color:var(--acc);font-variant-numeric:tabular-nums;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.var-tag{font-size:9px;font-weight:700;background:var(--p-d);color:var(--p);padding:2px 5px;border-radius:3px}
.sc-note{font-size:11px;color:var(--tx3);margin-bottom:8px}
.sc-times{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px}
.sct-label{color:var(--tx3)}
.sct-val{color:var(--tx);font-variant-numeric:tabular-nums;font-weight:600}
.on-badge{display:inline-block;font-size:10px;background:var(--p-d);color:var(--p);padding:2px 6px;border-radius:4px;margin-top:5px}
.sc-foot{display:flex;gap:5px;margin-top:9px}
.btn-sm{flex:1;background:none;border:1px solid var(--bdr2);color:var(--tx2);padding:10px 8px;border-radius:var(--rad-s);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;min-height:40px}
.btn-sm:hover{border-color:var(--acc);color:var(--acc)}
.btn-sm.warn{border-color:rgba(239,68,68,.3);color:var(--r)}
.btn-sm.warn:hover{background:var(--r-d)}
.overlay{position:fixed;inset:0;background:var(--dim);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--rad);padding:22px;width:100%;max-width:440px;box-shadow:0 16px 48px rgba(0,0,0,.6);transform:translateY(10px);transition:transform .2s;max-height:92vh;overflow-y:auto;overscroll-behavior:contain}
.overlay.open .modal{transform:translateY(0)}
.modal-wide{max-width:620px}
.modal-grab{display:none}
@media(max-width:640px){
  .overlay{align-items:flex-end;padding:0}
  .modal,.modal-wide{max-width:none;border:none;border-top:1px solid var(--glass-edge);border-radius:22px 22px 0 0;background:var(--glass);-webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);padding:8px 20px calc(20px + env(safe-area-inset-bottom));max-height:92vh;transition:none;transform:translateY(105%);will-change:transform}
  .overlay.open .modal{transform:translateY(105%)}
  .modal-grab{display:block;width:38px;height:5px;border-radius:999px;background:var(--tx3);opacity:.55;margin:6px auto 14px;cursor:grab;touch-action:none}
}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--acc)}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:700}
.fi,.fs{width:100%;background:var(--s2);border:1px solid var(--bdr2);color:var(--tx);padding:9px 11px;border-radius:var(--rad-s);font-family:inherit;font-size:16px;transition:border-color .15s}
.fi:focus,.fs:focus{outline:none;border-color:var(--acc)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--rad-s);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;transition:all .15s;min-height:40px}
.btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-primary:hover{background:var(--acc2)}
.btn-secondary{background:var(--s2);color:var(--tx);border-color:var(--bdr2)}
.btn-secondary:hover{border-color:var(--tx2)}
.btn-ghost{background:none;color:var(--tx2);border-color:var(--bdr2)}
.btn-ghost:hover{border-color:var(--tx2);color:var(--tx)}

/* 按壓即回饋：pointer-down 瞬間縮小（Apple design：react on pointer-down） */
.btn:active,.btn-sm:active,.nav-tab:active,.cal-nav-btn:active,.filter-btn:active{transform:scale(.96)}

/* 鍵盤焦點外框（只在鍵盤導航時出現） */
button:focus-visible,.btn:focus-visible,.btn-sm:focus-visible,.nav-tab:focus-visible,.filter-btn:focus-visible,a:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:var(--rad-s)}
.fi:focus-visible,.fs:focus-visible,.srch:focus-visible{outline:2px solid var(--acc);outline-offset:1px}

/* 觸控裝置：取消 hover 視覺殘留（手機/平板點完按鈕後狀態不會卡住） */
@media (hover: none) {
  .nav-tab:not(.active):hover{color:var(--tx2)}
  .nav-tab.active:hover{color:var(--acc)}
  .cal-nav-btn:hover{background:var(--s2)}
  .cal-nav-btn.glass:hover{background:var(--glass-lq);filter:none}
  .cal-title:hover{color:inherit}
  .cal-month-opt:hover{background:transparent}
  .btn-sm:hover{border-color:var(--bdr2);color:var(--tx2)}
  .btn-sm.warn:hover{background:transparent}
  .btn-primary:hover{background:var(--acc)}
  .btn-secondary:hover{border-color:var(--bdr2)}
  .btn-ghost:hover{border-color:var(--bdr2);color:var(--tx2)}
}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:9px}
.sec-title{font-size:18px;font-weight:900}
.sec-sub{font-size:12px;color:var(--tx3);margin-top:2px}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:18px;margin-bottom:14px}
.sep{height:1px;background:var(--bdr);margin:14px 0}
.empty-state{text-align:center;padding:40px 16px;color:var(--tx3);border:1px dashed var(--bdr2);border-radius:var(--rad)}
.empty-icon{font-size:36px;margin-bottom:10px}
.toast-wrap{position:fixed;bottom:calc(88px + env(safe-area-inset-bottom));right:18px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--s1);border:1px solid var(--bdr2);color:var(--tx);padding:10px 14px;border-radius:var(--rad-s);font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tin .2s ease;display:flex;align-items:center;gap:7px}
.toast.ok{border-left:3px solid var(--g)}
.toast.err{border-left:3px solid var(--r)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.app-hidden{display:none!important}
.admin-only{display:none!important}
.admin-mode .admin-only{display:flex!important}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--tx3)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
@media(max-width:580px){
  .main{padding:14px 11px calc(92px + env(safe-area-inset-bottom))}
  .cal-cell{min-height:58px}
  .f2{grid-template-columns:1fr}
  .nav-tab{padding:9px 12px}
  .nav-tab:not(.active) .nav-lbl{display:none}
  .brand-full{display:none}
  .brand-short{display:inline}
}

/* 輔助設定（Apple design：respect user settings） */
@media (prefers-reduced-motion: reduce){
  *{transition-duration:.01ms!important;animation-duration:.01ms!important}
  .spinner{animation-duration:.8s!important}
}
@media (prefers-reduced-transparency: reduce){
  .tabbar{-webkit-backdrop-filter:none;backdrop-filter:none;background:var(--s1)}
  .cal-nav-btn.glass{-webkit-backdrop-filter:none;backdrop-filter:none;background:var(--s2)}
  .modal{-webkit-backdrop-filter:none;backdrop-filter:none;background:var(--s1)}
}
@media (prefers-contrast: more){
  .day-card,.card,.cal-card,.tabbar,.modal{border:1px solid var(--tx2)}
}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div class="loading-txt">連線中...</div>
</div>

<div id="app" class="app-hidden" style="flex-direction:column;min-height:100vh">
  <div class="topbar">
    <div class="brand">🚂 <span class="brand-full">彰化機務段輪班查詢</span><span class="brand-short">輪班查詢</span></div>
    <button class="emp-chip" id="empChip" style="display:none" onclick="if(confirm('更換員工編號？'))changeEmp()" aria-label="更換員工編號">👤 <span id="empDisplay">—</span></button>
    <div class="status-wrap">
      <div class="clock" id="topClock" aria-label="現在時刻"></div>
      <div class="dot" id="statusDot" role="status" aria-label="連線中"></div>
    </div>
  </div>

  <nav class="tabbar" id="tabbar">

<script>
// ── CONFIG ──────────────────────────────────────
const SUPABASE_URL      = 'https://pgvrnhzbxgwcqbzeanai.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBndnJuaHpieGd3Y3FiemVhbmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTg3NDYsImV4cCI6MjA5Mzk3NDc0Nn0.hcIlr_ZIaDjd1YRWJv8rM3wu6-Ix16pPyBVgVHeE4xc';
const IMAGE_BASE        = 'https://barett07.github.io/railwayshift/images/';
const ADMIN_MODE        = new URLSearchParams(window.location.search).get('admin') === '1';

const escapeHtml = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
function isShiftVariant(name) {
  return /(?:AV|V)$/.test(String(name ?? '').trim());
}
function getShiftImageSrc(shiftId) {
  const name = String(shiftId ?? '').trim();
  if (!name) return '';
  const imageName = isShiftVariant(name) ? name.replace(/(?:AV|V)$/, '') : name;
  return IMAGE_BASE + imageName + '.jpeg';
}

// ── STATE ────────────────────────────────────────
let employeeId = '';
let employeeName = '';
let shiftsMap = {};
let monthCache = {};
let calY = new Date().getFullYear();
let calM = new Date().getMonth() + 1;
let homeOffset = 0;
let _parsedUpload = null;
let _parsedShiftXLSX = null;
let shiftFilter = 'all';
let tempOverrides = {};

// ── SUPABASE ─────────────────────────────────────
const SB_H = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
  'Content-Type': 'application/json'
};
async function sbFetch(path, opts) {
  const r = await fetch(SUPABASE_URL + path, { ...opts, headers: { ...SB_H, ...(opts?.headers || {}) } });
  if (!r.ok) { const t = await r.text(); throw new Error(r.status + ' ' + t.slice(0, 160)); }
  return r.headers.get('content-length') === '0' || r.status === 204 ? null : r.json();
}

// ── 寫入密碼管理 ──────────────────────────────
const _WTK = 'rr_write_token';
function _getWT(){ return localStorage.getItem(_WTK); }
function _saveWT(t){ localStorage.setItem(_WTK, t); }
function _clearWT(){ localStorage.removeItem(_WTK); }
let _wtResolve = null;
function _requireWT(){
  const t = _getWT();
  if(t) return Promise.resolve(t);
  return new Promise(resolve => {
    _wtResolve = resolve;
    setModal('管理員驗證',
      `<div class="fg"><label class="fl">寫入密碼</label>
       <input class="fi" type="password" id="wtInput" placeholder="請輸入密碼" autocomplete="current-password" style="font-size:16px"></div>`,
      [{label:'取消',cls:'btn-secondary',fn:'closeM()'},{label:'確認',cls:'btn-primary',fn:'_confirmWT()'}]
    );
    setTimeout(()=>document.getElementById('wtInput')?.focus(),100);
  });
}
window._confirmWT = function(){
  const val = (document.getElementById('wtInput')?.value||'').trim();
  if(!val) return;
  _saveWT(val); closeM();
  if(_wtResolve){ _wtResolve(val); _wtResolve=null; }
};
async function adminFetch(action, payload){
  const token = await _requireWT();
  const res = await fetch(SUPABASE_URL + '/functions/v1/admin-write', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+SUPABASE_ANON_KEY, 'X-Write-Token': token },
    body: JSON.stringify({ action, ...payload })
  });
  if(!res.ok){
    if(res.status === 401){ _clearWT(); throw new Error('管理員密碼已失效，請重新整理頁面'); }
    const t = await res.text();
    throw new Error(res.status + ' ' + t.slice(0, 160));
  }
}

// ── DATE UTILS ───────────────────────────────────
const p2 = n => String(n).padStart(2, '0');
function todayStr() { const d = new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function addDays(ds, n) { const d = new Date(ds+'T00:00:00'); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
const WD = ['日','一','二','三','四','五','六'];
function wd(ds) { return WD[new Date(ds+'T00:00:00').getDay()]; }
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function fmt(t) { return t || '—'; }

// ── SHIFT HELPERS ────────────────────────────────
function mapShift(row) {
  return {
    id: row.id, name: row.name || row.id,
    startTime: row.start_time || '',
    endTime: row.end_time || '',
    specialNote: row.special_note || '',
    isOvernight: row.is_overnight || false,
    depTrain: row.dep_train || '',
    arrTrain: row.arr_train || '',
  };
}
async function loadShifts() {
  const data = await sbFetch('/rest/v1/shifts?select=*&order=id');
  shiftsMap = {};
  (data || []).forEach(row => { const s = mapShift(row); shiftsMap[s.id] = s; });
  const el = document.getElementById('shiftsCount');
  if (el) el.textContent = `共 ${Object.keys(shiftsMap).length} 班`;
}
function getShift(id) {
  if (!id) return null;
  if (shiftsMap[id]) return shiftsMap[id];
  const base = id.replace(/AV$|V$/, '');
  return shiftsMap[base] || null;
}
function sortShifts(arr) {
  return [...arr].sort((a, b) => {
    const parse = name => { const m = name.match(/^(\d+)(.*)/); return m ? [parseInt(m[1]), m[2]] : [9999, name]; };
    const [an, as] = parse(a.name), [bn, bs] = parse(b.name);
    if (an !== bn) return an - bn;
    const rank = s => s===''?0:s==='AV'?1:s==='V'?2:3;
    return rank(as) - rank(bs) || as.localeCompare(bs);
  });
}

// ── DAY INFO ─────────────────────────────────────
function codeToInfo(code) {
  const c = String(code || '').trim();
  if (!c || c === '—' || c === '-' || c === '休') return { type: 'rest' };
  if (c === '例假') return { type: 'off' };
  if (c === '特休') return { type: 'leave' };
  return { type: 'work', shiftId: c };
}
function getDayInfo(ds) {
  if (tempOverrides[ds]) return tempOverrides[ds];
  const [y, m, d] = ds.split('-');
  const data = monthCache[`${y}-${m}`];
  if (!data) return { type: 'unknown' };
  return codeToInfo(data[parseInt(d)]);
}

// ── MONTH LOADING ────────────────────────────────
async function loadMonth(y, m) {
  const key = `${y}-${p2(m)}`;
  if (key in monthCache) return;
  monthCache[key] = null;
  if (!employeeId) { monthCache[key] = {}; return; }
  try {
    const data = await sbFetch(`/rest/v1/monthly_schedules?employee_id=eq.${encodeURIComponent(employeeId)}&year=eq.${y}&month=eq.${m}&select=day,shift_code`);
    const map = {};
    (data || []).forEach(r => { map[r.day] = r.shift_code || ''; });
    monthCache[key] = map;
  } catch(e) {
    delete monthCache[key];
    throw e;
  }
}

// ── EMPLOYEE ─────────────────────────────────────
async function setEmp() {
  const val = (document.getElementById('empInput')?.value || '').trim().replace(/^0+/, '');
  if (!val) { toast('請輸入員工編號', 'err'); return; }
  let data;
  try {
    data = await sbFetch(`/rest/v1/workers?employee_id=eq.${encodeURIComponent(val)}&select=name&limit=1`);
  } catch(e) {
    toast('連線失敗，請稍後再試', 'err'); return;
  }
  if (!data?.length) { toast('查無此員工編號，請確認後重新輸入', 'err'); return; }
  employeeId = val; employeeName = data[0].name || '';
  localStorage.setItem('rr_emp_id', val);
  localStorage.setItem('rr_emp_name', employeeName);
  monthCache = {};
  loadTempOverrides();
  updateEmpUI();
  const now = new Date();
  loadMonth(now.getFullYear(), now.getMonth()+1).then(() => renderHome()).catch(console.warn);
}
function changeEmp() {
  employeeId = ''; employeeName = ''; monthCache = {}; tempOverrides = {};
  localStorage.removeItem('rr_emp_id'); localStorage.removeItem('rr_emp_name');
  homeOffset = 0;
  updateEmpUI();
  renderHome();
}
function updateEmpUI() {
  const hasEmp = !!employeeId;
  document.getElementById('empPrompt').style.display = hasEmp ? 'none' : '';
  document.getElementById('empInfo').style.display   = hasEmp ? '' : 'none';
  const el = document.getElementById('empDisplay');
  if (el) el.textContent = employeeName ? `${employeeName}（${employeeId}）` : `員工編號：${employeeId}`;
  const chip = document.getElementById('empChip');
  if (chip) chip.style.display = hasEmp ? '' : 'none';
  const calNoEmp  = document.getElementById('calNoEmp');
  const calContent = document.getElementById('calContent');
  if (calNoEmp)  calNoEmp.style.display  = hasEmp ? 'none' : '';
  if (calContent) calContent.style.display = hasEmp ? '' : 'none';
}

// ── HOME ─────────────────────────────────────────
const TL = { work:'🚄 工作班', off:'🔴 例假', rest:'🟢 休班', leave:'🟠 特休', unknown:'—' };
const TB = { work:'badge-work', off:'badge-off', rest:'badge-rest', leave:'badge-leave', unknown:'badge-unknown' };
const TC = { work:'work', off:'off', rest:'rest', leave:'leave', unknown:'' };

function renderHome() {
  updateEmpUI();
  if (!employeeId) return;
  const today = todayStr();
  const d1 = addDays(today, homeOffset), d2 = addDays(today, homeOffset+1);
  const isBase = homeOffset === 0;
  document.getElementById('homeLabel').textContent = `${d1} ／ ${d2}`;
  document.getElementById('todayDisp').textContent = isBase ? '今日 ／ 明日' : '';
  document.getElementById('dayCards').innerHTML =
    buildDayCard(d1, isBase?'今日':(homeOffset===1?'明日':d1), d1===today) +
    buildDayCard(d2, isBase?'明日':(homeOffset===1?'後日':d2), d2===today);
}
function homeMove(dir) { homeOffset += dir; renderHome(); _slideIn(document.getElementById('dayCards'), dir); }

function buildDayCard(ds, label, isToday) {
  const info = getDayInfo(ds);
  const shift = info.shiftId ? getShift(info.shiftId) : null;
  const bcls = TB[info.type] || 'badge-unknown';
  const hasOverride = !!tempOverrides[ds];
  let body = '';
  if (info.type === 'work') {
    const name = shift ? shift.name : (info.shiftId || '?');
    const startT = info.customStartTime || shift?.startTime || '';
    const endT   = info.customEndTime   || '';
    const note = info.note || shift?.specialNote || '';
    body = `<div class="dc-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px">
        <div class="shift-num" style="margin-bottom:0;line-height:1">${escapeHtml(name)}</div>
        <div style="text-align:right;flex-shrink:0">
          ${startT ? `<div style="font-size:10px;color:var(--tx3);letter-spacing:.08em;margin-bottom:2px">⏱ 上班時間</div>
          <div style="font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;color:#fff;line-height:1">${startT}</div>` : ''}
          ${endT ? `<div style="font-size:10px;color:var(--tx3);letter-spacing:.08em;margin-top:6px;margin-bottom:2px">🏁 下班時間</div>
          <div style="font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--tx2);line-height:1">${endT}</div>` : ''}
        </div>
      </div>
      ${note ? `<div class="s-note" style="margin-bottom:10px">📋 ${escapeHtml(note)}</div>` : ''}
      <img class="shift-img" src="${getShiftImageSrc(info.shiftId)}" alt="${name}" onerror="this.style.display='none'">
    </div>`;
  } else {
    const note = info.note || '';
    if (info.type === 'unknown') {
      body = `<div class="no-work"><div class="no-work-icon">⏳</div><div class="no-work-label">資料載入中...</div></div>`;
    } else if (info.type === 'rest') {
      const prevDs = addDays(ds, -1);
      const prevInfo = getDayInfo(prevDs);
      const prevShift = (prevInfo.type === 'work' && prevInfo.shiftId) ? getShift(prevInfo.shiftId) : null;
      if (prevShift) {
        body = `<div class="dc-body">
          <div style="font-size:10px;color:var(--tx3);letter-spacing:.05em;margin-bottom:6px">⟳ 昨日跨夜工作班</div>
          ${prevShift.specialNote ? `<div class="s-note" style="margin-bottom:8px">📋 ${prevShift.specialNote}</div>` : ''}
          <img class="shift-img" src="${getShiftImageSrc(prevInfo.shiftId)}" alt="${prevInfo.shiftId}" onerror="this.style.display='none'">
          ${note ? `<div style="font-size:12px;color:var(--tx3);margin-top:8px">📋 ${note}</div>` : ''}
        </div>`;
      } else {
        body = `<div class="no-work">${note ? `<div style="font-size:12px;color:var(--tx3)">📋 ${note}</div>` : ''}</div>`;
      }
    } else {
      body = `<div class="no-work">${note ? `<div style="font-size:12px;color:var(--tx3)">📋 ${note}</div>` : ''}</div>`;
    }
  }
  return `<div class="day-card ${isToday?'is-today':''}" ${hasOverride?'style="border-color:rgba(255,159,10,0.5)"':''}>
    <div class="dc-head">
      <div>
        <div class="dc-label">${label}</div>
        <div class="dc-date">${ds}</div>
        <div class="dc-wd">星期${wd(ds)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <span class="badge ${bcls}" style="font-size:14px;padding:6px 14px">${TL[info.type]||'—'}</span>
        <button onclick="openTempEdit('${ds}')" style="background:none;border:none;color:${hasOverride?'#22d3ee':'var(--tx3)'};font-size:11px;cursor:pointer;padding:2px 0;font-family:inherit">${hasOverride?'✅ 已臨時修改':'✏️ 臨時修改'}</button>
      </div>
    </div>
    ${body}
  </div>`;
}

// ── CALENDAR ─────────────────────────────────────
const CAL_LABEL = { off:'例假', rest:'休班', leave:'特休' };
function renderCal() {
  document.getElementById('calTitle').textContent = `${calY}年${calM}月`;
  const days = daysInMonth(calY, calM), first = new Date(calY, calM-1, 1).getDay(), today = todayStr();
  const key = `${calY}-${p2(calM)}`;
  let h = ['日','一','二','三','四','五','六'].map(w => `<div class="cal-hd">${w}</div>`).join('');
  const prevDays = daysInMonth(calM===1?calY-1:calY, calM===1?12:calM-1);
  for (let i = 0; i < first; i++) h += `<div class="cal-cell empty"><div class="cc-day">${prevDays-first+1+i}</div></div>`;
  for (let d = 1; d <= days; d++) {
    const ds = `${calY}-${p2(calM)}-${p2(d)}`;
    const info = getDayInfo(ds), sh = info.shiftId ? getShift(info.shiftId) : null;
    const cls = TC[info.type] || '';

    const typeLabel = (!name && info.type !== 'unknown') ? (CAL_LABEL[info.type] || '') : '';

      ${name ? `<div class="cc-shift">${name}</div>` : ''}
      ${typeLabel ? `<div class="cc-type">${typeLabel}</div>` : ''}
    </div>`;
  }

  const noData = document.getElementById('calNoData');
  if (noData) noData.style.display = (key in monthCache && !(monthCache[key] && Object.keys(monthCache[key]).length)) ? '' : 'none';
}

window.parseUploadXLSX = function(e) {
    const file = e.target.files[0]; if (!file) return;
    const prev = document.getElementById('xlUpPrev');
    prev.textContent = '解析中...';
    _parsedUpload = null;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        // Detect year/month
        let year=null, month=null;
        for (let i=0; i<Math.min(6,rows.length); i++) {
          const line = rows[i].map(c=>String(c)).join('');
          const m1 = line.match(/(\d{3})年(\d{1,2})月/);
          const m2 = line.match(/(\d{4})年(\d{1,2})月/);
          if (m1) { year=parseInt(m1[1])+1911; month=parseInt(m1[2]); break; }
          if (m2 && parseInt(m2[1])>1900) { year=parseInt(m2[1]); month=parseInt(m2[2]); break; }
        }
        if (!year) {
          const fn = file.name, fnm = fn.match(/(\d{3})年?(\d{2})月/);
          if (fnm) { year=parseInt(fnm[1])+1911; month=parseInt(fnm[2]); }
          else { year=new Date().getFullYear(); month=new Date().getMonth()+1; }
        }
        // Find date header row
        let hrIdx=-1, dateColMap={}, maxHits=0;
        for (let i=0; i<rows.length; i++) {
          const tmp={};
          rows[i].forEach((c,ci) => {
            const v = typeof c==='number' ? c : parseFloat(String(c).trim());
            if (Number.isInteger(v) && v>=1 && v<=31) tmp[v]=ci;
          });
          if (Object.keys(tmp).length > maxHits) { maxHits=Object.keys(tmp).length; hrIdx=i; dateColMap=tmp; }
        }
        if (maxHits < 20) { prev.textContent='❌ 找不到日期欄位，請確認 Excel 格式'; return; }
        const maxDay = daysInMonth(year, month);
        const workers = [];
        for (let r=hrIdx+1; r<rows.length; r++) {
          const row = rows[r];
          const rawName = String(row[0]||'').trim();
          if (!rawName) continue;
          const nameParts = rawName.split(/[\n\r]/);
          const name = nameParts[0].trim();
          if (!name) continue;
          if (/^[日一二三四五六衛接\s]+$/.test(name)) continue;
          if (/^[123][\.\、]|^注意/.test(name)) continue;
          let hasData = false;
          for (let d=1; d<=maxDay; d++) {
            if (dateColMap[d]!==undefined && String(row[dateColMap[d]]||'').trim()) { hasData=true; break; }
          }
          if (!hasData) continue;
          const id = (nameParts[1]?.trim() || String(row[1]||'').trim());
          const days = {};
          for (let d=1; d<=maxDay; d++) {
            if (dateColMap[d]===undefined) continue;
            days[d] = String(row[dateColMap[d]]||'').trim();
          }
          workers.push({ name, id, days });
        }
        if (!workers.length) { prev.textContent='❌ 未找到任何人員班表資料'; return; }
        _parsedUpload = { year, month, workers };
        prev.innerHTML = `✅ <b>${year} 年 ${p2(month)} 月</b>，共 ${workers.length} 人，確認無誤後點擊「確認上傳」`;
      } catch(err) {
        prev.textContent = '❌ 解析失敗：' + err.message;
        _parsedUpload = null;
      }
    };
    reader.readAsArrayBuffer(file);
};

window.doUpload = async function() {
  if (!_parsedUpload) { toast('請先選擇並解析 Excel 檔案', 'err'); return; }
  const { year, month, workers } = _parsedUpload;
  if (!confirm(`確認上傳 ${year}年${p2(month)}月 班表？共 ${workers.length} 人，現有資料將被覆蓋。`)) return;
  const prev = document.getElementById('xlUpPrev');
  prev.textContent = '上傳中，請稍候...';
  try {
    // 1. Upsert workers (deduplicate by employee_id — same person may appear twice in Excel)
    const wMap = new Map();
    for (const w of workers) {
      if (w.id) wMap.set(String(w.id), { employee_id: String(w.id), name: w.name });
    }
    const wRows = [...wMap.values()];
    if (wRows.length) {
      prev.textContent = `上傳中：同步員工資料（${wRows.length} 人）...`;
      await adminFetch('upsert-workers', { rows: wRows });
    }
    // 2. Delete existing for this year/month
    prev.textContent = `上傳中：清除舊班表資料...`;
    await adminFetch('delete-schedules', { year, month });
    // 3. Build insert rows (deduplicate by employee_id+day)
    const rowMap = new Map();
    for (const w of workers) {
      if (!w.id) continue;
      const empId = String(w.id);
      for (const [d, code] of Object.entries(w.days)) {
        const c = code.trim();
        if (c) rowMap.set(`${empId}-${d}`, { year, month, employee_id: empId, day: parseInt(d), shift_code: c });
      }
    }
    const rows = [...rowMap.values()];
    // 4. Insert in chunks of 500 (DELETE already cleared existing data)
    const total = rows.length;
    for (let i=0; i<rows.length; i+=500) {
      prev.textContent = `上傳中：寫入班表（${Math.min(i+500, total)}/${total} 筆）...`;
      await adminFetch('insert-schedules', { rows: rows.slice(i, i+500) });
    }
    // 5. Clear cache and refresh
    const key = `${year}-${p2(month)}`;
    delete monthCache[key];
    const now = new Date();
    if (year===now.getFullYear() && month===now.getMonth()+1) {
      await loadMonth(year, month);
      renderHome();
    }
    if (year===calY && month===calM) {
      await loadMonth(year, month);
      renderCal();
    }
    prev.innerHTML = `✅ 上傳完成！${year}年${p2(month)}月，${workers.length} 人，${rows.length} 筆班表資料`;
    toast(`✅ 上傳成功`, 'ok');
    _parsedUpload = null;
    document.getElementById('xlUpFile').value = '';
  } catch(e) {
    prev.textContent = '❌ 上傳失敗：' + e.message;
    toast('上傳失敗', 'err');
  }
};

      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      let hr = -1;
      for (let i=0; i<rows.length; i++) { if (rows[i].some(c => String(c).trim()==='工作班')) { hr=i; break; } }
      if (hr < 0) { prev.textContent='❌ 找不到「工作班」欄位'; return; }
      const colMap = {};
      rows[hr].forEach((h,i) => { const k=String(h).trim(); if(k) colMap[k]=i; });
      const required = ['工作班','上班時間','下班時間'];
      const missing = required.filter(k => colMap[k]===undefined);
      if (missing.length) { prev.textContent='❌ 缺少欄位：'+missing.join('、'); _parsedShiftXLSX=null; return; }
      const ci = { name:colMap['工作班'], st:colMap['上班時間'], et:colMap['下班時間'],
        sn:colMap['工作班特定行駛']??colMap['備註']??-1,
        dep:colMap['上班車次']??-1, arr:colMap['下班車次']??-1 };
      const toT = v => { if(!v&&v!==0)return''; const s=String(v).trim(); if(s.includes(':')){ const p=s.split(':'); return p[0].padStart(2,'0')+':'+p[1].padStart(2,'0'); } if(typeof v==='number'){ const m=Math.round(v*24*60); return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); } return''; };
      _parsedShiftXLSX = [];
      for (let r=hr+1; r<rows.length; r++) {
        const row=rows[r], name=String(row[ci.name]||'').trim();
        if (!name||name==='nan') continue;
        const st=toT(row[ci.st]), et=toT(row[ci.et]);
        _parsedShiftXLSX.push({ id:name, name, start_time:st, end_time:et,
          special_note:ci.sn>=0?String(row[ci.sn]||'').trim():'',
          dep_train:ci.dep>=0?String(row[ci.dep]||'').trim():'',
          arr_train:ci.arr>=0?String(row[ci.arr]||'').trim():'',
          is_overnight: et&&st ? et<=st : false,
          board_time:'', alight_time:'' });
      }
      if (!_parsedShiftXLSX.length) { prev.textContent='❌ 未找到工作班資料'; _parsedShiftXLSX=null; return; }
      prev.textContent = `✅ 解析完成：${_parsedShiftXLSX.length} 個工作班`;
    } catch(err) { prev.textContent='❌ 解析失敗：'+err.message; _parsedShiftXLSX=null; }
  };
  reader.readAsArrayBuffer(file);
}
window.doImportShifts = async function() {
  if (!_parsedShiftXLSX?.length) { toast('請先選擇檔案', 'err'); return; }
  if (!confirm(`確認匯入 ${_parsedShiftXLSX.length} 個工作班？`)) return;
  try {
    // Deduplicate by id (Excel may have repeated rows)
    const seen = new Set();
    const rows = _parsedShiftXLSX.filter(s => { if (seen.has(s.id)) return false; seen.add(s.id); return true; });
    await adminFetch('delete-all-shifts', {});
    for (let i=0; i<rows.length; i+=100) {
      await adminFetch('upsert-shifts', { rows: rows.slice(i, i+100) });
    }
    await loadShifts(); renderShifts(); closeM();
    toast(`✅ 已匯入 ${rows.length} 個工作班`, 'ok');
    _parsedShiftXLSX = null;
  } catch(e) { toast('匯入失敗：'+e.message, 'err'); }
};

// ── MODAL / TOAST / NAV ───────────────────────────
function setModal(title, body, actions, wide) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalBox').className = 'modal' + (wide?' modal-wide':'');
  document.getElementById('modalActions').innerHTML = actions.map(a =>
    `<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('');
  document.getElementById('overlay').classList.add('open');
  _sheetOpen();
}
function overlayClick(e) { if (!_adminAuthPending && e.target===document.getElementById('overlay')) closeM(); }
function closeM() {
  const ov = document.getElementById('overlay');
  if (_isSheet() && ov.classList.contains('open')) { ov.classList.remove('open'); _sheetClose(0); }
  else ov.classList.remove('open');
}

/* ── 手機底部彈簧面板（Apple design：spring damping 0.8 / response 0.3、
      1:1 拖曳、橡皮筋阻尼、放手速度接手、可中途打斷） ── */
const _SHEET_MQ = matchMedia('(max-width:640px)');
const _REDUCE_MOTION = matchMedia('(prefers-reduced-motion: reduce)');
function _isSheet() { return _SHEET_MQ.matches && !_REDUCE_MOTION.matches; }
let _shRaf = null, _shY = 0;
function _shBox() { return document.getElementById('modalBox'); }
function _shH() { return _shBox().offsetHeight + 60; }
function _shApply() { _shBox().style.transform = `translateY(${_shY}px)`; }
function _shSpring(target, v0, done) {
  cancelAnimationFrame(_shRaf);
  const zeta = 0.8, omega = 2 * Math.PI / 0.3;
  let x = _shY, v = v0 || 0, last = performance.now();
  function step(now) {
    const dt = Math.min(.032, (now - last) / 1000); last = now;
    const a = -omega * omega * (x - target) - 2 * zeta * omega * v;
    v += a * dt; x += v * dt;
    _shY = x; _shApply();
    if (Math.abs(x - target) < .3 && Math.abs(v) < .3) { _shY = target; _shApply(); done && done(); return; }
    _shRaf = requestAnimationFrame(step);
  }
  _shRaf = requestAnimationFrame(step);
}
function _sheetOpen() {
  const m = _shBox();
  if (_SHEET_MQ.matches) {
    if (_REDUCE_MOTION.matches) { m.style.transform = 'translateY(0)'; return; }
    cancelAnimationFrame(_shRaf);
    _shY = _shH(); _shApply();
    _shSpring(0, 0);
  } else m.style.transform = '';
}
function _sheetClose(v0) {
  const m = _shBox();
  if (_REDUCE_MOTION.matches) { m.style.transform = ''; return; }
  _shSpring(_shH(), v0 || 0, () => { m.style.transform = ''; });
}
(function() {
  const grab = document.getElementById('modalGrab');
  function _rubber(over, dim, c = 0.55) { return (over * dim * c) / (dim + c * Math.abs(over)); }
  let drag = false, py0 = 0, y0 = 0, lastY = 0, lastT = 0, vel = 0;
  grab.addEventListener('pointerdown', e => {
    if (!_isSheet()) return;
    drag = true; cancelAnimationFrame(_shRaf);
    py0 = e.clientY; y0 = _shY; lastY = e.clientY; lastT = performance.now(); vel = 0;
    grab.setPointerCapture(e.pointerId);
  });
  grab.addEventListener('pointermove', e => {
    if (!drag) return;
    const now = performance.now(), dt = now - lastT;
    if (dt > 0) { vel = (e.clientY - lastY) / dt * 1000; lastY = e.clientY; lastT = now; }
    let ny = y0 + (e.clientY - py0);
    if (ny < 0) ny = _rubber(ny, _shH());
    _shY = ny; _shApply();
  });
  const end = () => {
    if (!drag) return; drag = false;
    if (_adminAuthPending) { _shSpring(0, vel / 60); return; }
    const rate = 0.99;
    const projected = _shY + (vel / 1000) * rate / (1 - rate) * 16;
    if (projected > _shH() * 0.35) { document.getElementById('overlay').classList.remove('open'); _sheetClose(vel / 60); }
    else _shSpring(0, vel / 60);
  };
  grab.addEventListener('pointerup', end);
  grab.addEventListener('pointercancel', end);
})();
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'toast ' + type; el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function setStatus(on) {
  const dot = document.getElementById('statusDot');
  if (dot) {
    dot.className = 'dot' + (on?' on':'');
    dot.setAttribute('aria-label', on ? '已連線' : '離線');
  }
}
let _pageIdx = 0;
function _slideIn(el, dir) {
  if (!el) return;
  el.classList.remove('slide-l', 'slide-r');
  void el.offsetWidth;
  el.classList.add(dir > 0 ? 'slide-l' : 'slide-r');
  el.addEventListener('animationend', () => el.classList.remove('slide-l', 'slide-r'), { once: true });
}
function _moveTabLens() {
  const lens = document.getElementById('tabLens'), act = document.querySelector('.nav-tab.active');
  if (!lens || !act || !act.offsetWidth) return;
  lens.style.width = act.offsetWidth + 'px';
  lens.style.transform = `translateX(${act.offsetLeft}px)`;
}
function showPage(name) {
  const alreadyOnHome = name === 'home' && document.getElementById('page-home')?.classList.contains('active');
  const alreadyOnCal  = name === 'calendar' && document.getElementById('page-calendar')?.classList.contains('active');
  const alreadyActive = document.getElementById('page-' + name)?.classList.contains('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name)?.classList.add('active');
  const idx = { home:0, calendar:1, admin:2 };
  document.querySelectorAll('.nav-tab')[idx[name]]?.classList.add('active');
  const dir = idx[name] - _pageIdx; _pageIdx = idx[name];
  if (dir !== 0 && !alreadyActive) _slideIn(document.getElementById('page-' + name), dir);
  requestAnimationFrame(_moveTabLens);
  if (name === 'home') {
    if (alreadyOnHome) homeOffset = 0;
    renderHome();
  }
  if (name === 'calendar') {
    if (alreadyOnCal) { const now = new Date(); calY = now.getFullYear(); calM = now.getMonth() + 1; }
    updateEmpUI();
    loadMonth(calY, calM).then(() => renderCal()).catch(console.warn);
  }
  if (name === 'admin') renderShifts();
}
window.goToDate = function(ds) {
  const today = todayStr();
  homeOffset = Math.round((new Date(ds+'T00:00:00') - new Date(today+'T00:00:00')) / 86400000);
  const [y, m] = ds.split('-');
  loadMonth(+y, +m).catch(() => {}).finally(() => showPage('home'));
};
function showApp() {
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.classList.remove('app-hidden');
  app.style.display = 'flex';
  updateEmpUI();
  renderHome();
  requestAnimationFrame(_moveTabLens);
}

/* ── 左右滑動手勢：首頁切日期、月曆切月份（60px 門檻、水平意圖判定） ── */
function _addSwipe(el, fn) {
  let sx = 0, sy = 0, t0 = 0, tracking = false;
  el.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; t0 = Date.now(); tracking = true;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (!tracking) return; tracking = false;
    const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2 && Date.now() - t0 < 600) fn(dx < 0 ? 1 : -1);
  }, { passive: true });
}
_addSwipe(document.getElementById('page-home'), d => { if (employeeId) homeMove(d); });
_addSwipe(document.getElementById('page-calendar'), d => { if (employeeId) calMove(d); });
window.addEventListener('resize', _moveTabLens);
(function(){const tb=document.querySelector('.topbar');if(!tb)return;
  const on=()=>tb.classList.toggle('scrolled',window.scrollY>8);
  window.addEventListener('scroll',on,{passive:true});on();})();

/* ── 頂欄即時時鐘（顯示到秒） ── */
function _tickClock() {
  const el = document.getElementById('topClock'); if (!el) return;
  const n = new Date();
  el.textContent = `${p2(n.getHours())}:${p2(n.getMinutes())}:${p2(n.getSeconds())}`;
}
_tickClock();
setInterval(_tickClock, 1000);
let _adminAuthPending = false;
async function _verifyToken(token) {
  // 本地預覽（localhost）直接放行：Edge Function CORS 白名單只允許正式網域，
  // 本地驗證必失敗;此旁路僅供預覽 UI,實際寫入仍會被 CORS 擋下
  if (['localhost','127.0.0.1'].includes(window.location.hostname)) return !!token;
  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/admin-write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'X-Write-Token': token },
      body: JSON.stringify({ action: 'verify' })
    });
    return res.status === 204;
  } catch { return false; }
}
function _showAdminModal(errMsg) {
  _adminAuthPending = true;
  setModal('管理員驗證',
    (errMsg ? `<div style="color:var(--r);font-size:13px;margin-bottom:10px">⚠ ${errMsg}</div>` : '') +
    `<div class="fg"><label class="fl">管理員密碼</label>
     <input class="fi" type="password" id="wtInput" placeholder="請輸入密碼" autocomplete="current-password" style="font-size:16px"></div>`,
    [{ label: '確認', cls: 'btn-primary', fn: '_confirmAdminLogin()' }]
  );
  setTimeout(() => document.getElementById('wtInput')?.focus(), 100);
}
window._confirmAdminLogin = async function() {
  const val = (document.getElementById('wtInput')?.value || '').trim();
  if (!val) return;
  const btn = document.querySelector('#modalActions .btn-primary');
  if (btn) { btn.textContent = '驗證中...'; btn.disabled = true; }
  const ok = await _verifyToken(val);
  if (ok) {
    _saveWT(val); _adminAuthPending = false; closeM();
    document.getElementById('app').classList.add('admin-mode');
  } else {
    _showAdminModal('密碼錯誤，請重試');
  }
};
async function _initAdminAuth() {
  const saved = _getWT();
  if (saved) {
    const ok = await _verifyToken(saved);
    if (ok) { document.getElementById('app').classList.add('admin-mode'); return; }
    _clearWT();
  }
  _showAdminModal();
}

// ── INIT ─────────────────────────────────────────
async function init() {
  employeeId   = (localStorage.getItem('rr_emp_id') || '').replace(/^0+/, '');
  employeeName = localStorage.getItem('rr_emp_name') || '';
  if (employeeId) localStorage.setItem('rr_emp_id', employeeId);
  if (employeeId) loadTempOverrides();
  showApp();
  if (ADMIN_MODE) _initAdminAuth();
  try {
    const now = new Date();
    const tasks = [loadShifts()];
    if (employeeId) tasks.push(loadMonth(now.getFullYear(), now.getMonth()+1));
    await Promise.all(tasks);
    setStatus(true);
    renderHome();
  } catch(e) {
    setStatus(false);
    console.warn('Init error:', e);
  }
}

setTimeout(() => {
  const l = document.getElementById('loading'), a = document.getElementById('app');
  if (l && l.style.display !== 'none') {
    l.style.display = 'none';
    if (a) { a.style.display = 'flex'; a.classList.remove('app-hidden'); }
  }
}, 4000);

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
